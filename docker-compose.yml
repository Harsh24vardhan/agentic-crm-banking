version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agentic-crm-db
    environment:
      POSTGRES_DB: observebank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d observebank"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentic-crm-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: observebank
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run seed && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-crm-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
